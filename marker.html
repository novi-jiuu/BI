<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebAR Marker</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script>
const API_URL = "https://script.google.com/macros/s/AKfycbz5UUBghTmuQB57nuixPhfR39pQVEGjvZzPjsij4lBKzZpswP3bRU-cN8_p82EDneim/exec";
const isMobile = /Mobi|Android/i.test(navigator.userAgent);
const facingMode = isMobile ? "environment": "user";
function getDeviceInfo() {
  const ua = navigator.userAgent;

  let deviceType = "Unknown";
  let os = "Unknown";

  if (/Mobi|Android/i.test(ua)) {
    deviceType = "Mobile";
  } else if (/Tablet|iPad/i.test(ua)) {
    deviceType = "Tablet";
  } else {
    deviceType = "Desktop";
  }

  if (/Android/i.test(ua)) {
    os = "Android";
  } else if (/iPhone|iPad|iPod/i.test(ua)) {
    os = "iOS";
  } else if (/Windows/i.test(ua)) {
    os = "Windows";
  } else if (/Mac/i.test(ua)) {
    os = "MacOS";
  } else if (/Linux/i.test(ua)) {
    os = "Linux";
  }

  return {
    deviceType,
    os,
    userAgent: ua
  };
}
// fungsi kirim data
function trackEvent(eventName, desa, object, duration = 0) {
  const device = getDeviceInfo();

  const data = {
    timestamp: new Date().toISOString(),
    event: eventName,
    desa: desa,
    object: object,
    device: device.deviceType,
    os: device.os,
    duration: duration
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });
}
</script>
  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
    }
    button {
      padding: 10px 15px; border: none;
      border-radius: 6px; background: #ff9800;
      color: white; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>
  <a-scene embedded vr-mode-ui="enabled:false"
  renderer="logarithmicDepthBuffer:true;"
  arjs="sourceType:webcam; debugUIEnabled:false;">

    <a-assets>
      <!-- Models -->
      <a-asset-item id="rumah-sebujit" src="assets/rumah_sebujit.glb"></a-asset-item>
      <a-asset-item id="nyobeng-sebujit" src="assets/nyobeng_sebujit.glb"></a-asset-item>
      <a-asset-item id="rumah-jagoi" src="assets/rumah_jagoi.glb"></a-asset-item>
      <a-asset-item id="gawia-jagoi" src="assets/gawia_jagoi.glb"></a-asset-item>

      <!-- Audio -->
      <audio id="narasi-sebujit-rumah" src="assets/narasi_rumah_sebujit.mp3"></audio>
      <audio id="narasi-sebujit-ritual" src="assets/narasi_nyobeng.mp3"></audio>
      <audio id="narasi-jagoi-rumah" src="assets/narasi_rumah_jagoi.mp3"></audio>
      <audio id="narasi-jagoi-ritual" src="assets/narasi_gawia.mp3"></audio>
      <audio id="musik-dayak" src="assets/dayak.mp3"></audio>
    </a-assets>

    <a-marker id="marker" type="pattern"></a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <div id="ui">
    <button onclick="keluarHalaman()">⬅ Kembali</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
	let sudahKeluar = false;
    const desa = params.get("desa");
    const type = params.get("type");
	
	if (desa && type) {
  trackEvent("masuk_marker", desa, type);
}
	
    const musikDayak = document.getElementById("musik-dayak");
	const marker = document.getElementById("marker");
	let startTime = new Date().getTime();

    const config = {
      sebujit: {
        rumah: { model: "#rumah-sebujit", patt: "assets/marker_rumah_sebujit.patt", audio: "narasi-sebujit-rumah", scale: "0.4 0.4 0.4" },
        ritual: { model: "#nyobeng-sebujit", patt: "assets/marker_ritual_sebujit.patt", audio: "narasi-sebujit-ritual", scale: "5 5 5" }
      },
      jagoi: {
        rumah: { model: "#rumah-jagoi", patt: "assets/marker_rumah_jagoi.patt", audio: "narasi-jagoi-rumah", scale: "0.4 0.4 0.4" },
        ritual: { model: "#gawia-jagoi", patt: "assets/marker_ritual_jagoi.patt", audio: "narasi-jagoi-ritual", scale: "0.8 0.8 0.8" }
      }
    };

    const cfg = config[desa]?.[type];
    if (cfg) {
      marker.setAttribute("url", cfg.patt);
      const entity = document.createElement("a-entity");
      entity.setAttribute("gltf-model", cfg.model);
      entity.setAttribute("scale", cfg.scale);
      entity.setAttribute("animation", "property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear");
      marker.appendChild(entity);

      const narasi = document.getElementById(cfg.audio);
      marker.addEventListener("markerFound", () => {
		startTime = new Date().getTime();
		trackEvent("marker_terdeteksi", desa, type);

		musikDayak.play();
		narasi.play();
	  });
	  marker.addEventListener("markerLost", () => {
		let endTime = new Date().getTime();
		let duration = Math.floor((endTime - startTime) / 1000);

		trackEvent("marker_hilang", desa, type, duration);

		musikDayak.pause();
		musikDayak.currentTime = 0;
		narasi.pause();
		narasi.currentTime = 0;
});
}
	function keluarHalaman() {
		let endTime = new Date().getTime();
		let duration = Math.floor((endTime - startTime) / 1000);

		trackEvent("keluar_marker", desa, type, duration);

		window.location.href = "index.html";
}
window.addEventListener("beforeunload", () => {
  if (sudahKeluar) return;
  sudahKeluar = true;

  let endTime = new Date().getTime();
  let duration = Math.floor((endTime - startTime) / 1000);

  trackEvent("keluar_marker", desa, type, duration);
});
  </script>
</body>
</html>
