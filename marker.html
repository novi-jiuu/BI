<script>

const API_URL="https://script.google.com/macros/s/AKfycbxIFfbwSdWVN241UJyyJ8ndkZUzTSgVs5C78DPZLh5EQJbd6sEjMiTlIvHJesuALn2F/exec";

const params=new URLSearchParams(window.location.search);
const desa=params.get("desa");
const type=params.get("type");

const marker=document.getElementById("marker");
const musik=document.getElementById("musik-dayak");

function trackEvent(eventName,desa,objek){

fetch(API_URL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
timestamp:new Date().toISOString(),
event:eventName,
desa:desa,
object:objek,
device:navigator.userAgent
})
});

}

trackEvent("open_ar",desa,type);

marker.addEventListener("markerFound",()=>{

trackEvent("marker_detected",desa,type);

musik.play();

});

marker.addEventListener("markerLost",()=>{

trackEvent("marker_lost",desa,type);

musik.pause();
musik.currentTime=0;

});

</script>
