<script>

const API_URL="https://script.google.com/macros/s/AKfycbz5UUBghTmuQB57nuixPhfR39pQVEGjvZzPjsij4lBKzZpswP3bRU-cN8_p82EDneim/exec";

const params=new URLSearchParams(window.location.search);
const desa=params.get("desa");
const type=params.get("type");

const container=document.getElementById("model-container");
const musik=document.getElementById("musik-dayak");

function trackEvent(eventName,desa,objek){

fetch(API_URL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
timestamp:new Date().toISOString(),
event:eventName,
desa:desa,
object:objek,
device:navigator.userAgent
})
});

}

if(type==="rumah"){
container.setAttribute("gltf-model","#rumah-sebujit");
}

if(type==="ritual"){
container.setAttribute("gltf-model","#nyobeng-sebujit");
}

trackEvent("model_loaded",desa,type);

musik.play();

</script>
